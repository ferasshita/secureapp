{% extends 'posts/base.html' %}
{% block content %}
<h1>Posts</h1>
{% for post in posts %}
  <article>
    <h2><a href="{% url 'posts:post_detail' post.pk %}">{{ post.name }}</a></h2>
    <p>{{ post.description }}</p>
    <img src="{% url 'posts:media' post.image_filename %}" alt="post image" width="200" />
  </article>
{% empty %}
  <p>No posts yet.</p>
{% endfor %}
{% endblock %}
